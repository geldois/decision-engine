name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      ENV: test
      DB_PREFIX: postgresql+psycopg
      DB_USER: user
      DB_PASS: pass
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: decision_engine_test

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: decision_engine_test
        ports:
          - "5432:5432"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .
      - run: decision-engine wait-db
      - run: pytest
      - run: alembic upgrade head
